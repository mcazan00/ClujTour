<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#d6c9b2" />
    <title>Cluj cu Noi Doi</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-one"></div>
    <div class="bg-shape bg-shape-two"></div>

    <main class="app-shell">
      <header class="top">
        <p class="eyebrow">Plimbare privată în Cluj-Napoca</p>
        <h1 id="tourTitle">Cluj cu Noi Doi</h1>
        <p id="tourSubtitle" class="subtitle"></p>
      </header>

      <section class="panel mode-switch">
        <div class="segmented" role="tablist" aria-label="Comutare mod">
          <button id="storyViewBtn" class="seg-btn active" type="button" role="tab" aria-selected="true">
            Story
          </button>
          <button id="adminViewBtn" class="seg-btn" type="button" role="tab" aria-selected="false">
            Admin
          </button>
        </div>
      </section>

      <div id="storyView">
        <section class="panel controls">
          <label class="toggle-row" for="dateModeToggle">
            <span>Mod Date</span>
            <input id="dateModeToggle" type="checkbox" />
          </label>
          <label class="toggle-row" for="historyModeToggle">
            <span>Mod Istorie+</span>
            <input id="historyModeToggle" type="checkbox" />
          </label>
          <label class="toggle-row" for="manualModeToggle">
            <span>Mod Manual (fără GPS)</span>
            <input id="manualModeToggle" type="checkbox" />
          </label>
          <div class="button-row">
            <button id="fullscreenBtn" class="ghost-btn" type="button">Ecran complet</button>
            <button id="resetBtn" class="ghost-btn danger" type="button">Reset traseu</button>
          </div>
        </section>

        <section id="statusPanel" class="panel status">
          <div class="progress-head">
            <p id="chapterLabel">Capitol 1</p>
            <p id="progressText">0/0</p>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <p id="geoStatus" class="geo-status">Pornim detectarea locației...</p>
          <p id="distanceText" class="distance-text"></p>
          <p id="scoreText" class="score-text"></p>
        </section>

        <section id="stopPanel" class="panel stop">
          <p id="chapterTitle" class="chapter-title"></p>
          <h2 id="stopTitle"></h2>
          <p id="lockedNotice" class="locked-notice"></p>

          <div id="storyBlock" class="story-block hidden" aria-live="polite">
            <figure id="stopFigure" class="stop-figure hidden">
              <img id="stopImage" class="stop-image" alt="" loading="lazy" />
              <figcaption id="stopImageCaption" class="stop-image-caption"></figcaption>
            </figure>
            <p id="introText"></p>
            <p id="historyText"></p>
            <p id="historyExtraText" class="history-extra hidden"></p>
            <p id="observationText" class="observation"></p>
            <p id="forUsText" class="for-us hidden"></p>
            <p id="clueText" class="clue"></p>
          </div>

          <div id="hintBox" class="hint-box hidden" aria-live="polite"></div>

          <div class="button-row main-actions">
            <button id="revealBtn" type="button">Reveal story</button>
            <button id="foundBtn" type="button" class="secondary">I found it</button>
          </div>
          <div class="button-row">
            <button id="hintBtn" type="button" class="secondary">Give me a hint</button>
            <button id="nextBtn" type="button" class="next-btn" disabled>Next stop</button>
          </div>
        </section>

        <section id="challengePanel" class="panel challenge hidden">
          <h3>Provocare</h3>
          <p id="challengeQuestion"></p>
          <div id="challengeOptions" class="options"></div>
          <p id="challengeFeedback" class="challenge-feedback"></p>
        </section>

        <section id="endingPanel" class="panel ending hidden">
          <p class="eyebrow">Final</p>
          <h2 id="endingTitle"></h2>
          <p id="endingMessage"></p>
          <button id="restartBtn" type="button">Reîncepem traseul</button>
        </section>
      </div>

      <section id="adminView" class="panel admin hidden">
        <p class="eyebrow">Panou intern</p>
        <h2 id="adminTitle">Admin local (read-only)</h2>
        <p id="adminSubtitle" class="subtitle">
          Aici vezi setările și datele traseului, fără editare din interfață.
        </p>

        <article class="admin-block">
          <h3 id="adminSettingsTitle">Setări tur</h3>
          <ul id="adminSettingsList" class="admin-list"></ul>
        </article>

        <article class="admin-block">
          <h3 id="adminStopsTitle">Locații</h3>
          <ul id="adminStopsList" class="admin-list"></ul>
        </article>

        <article class="admin-block">
          <h3 id="adminLandmarksTitle">Palate / Clădiri indexate</h3>
          <ul id="adminLandmarksList" class="admin-list"></ul>
        </article>
      </section>

      <footer class="footnote">
        <p id="authorNote"></p>
      </footer>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
